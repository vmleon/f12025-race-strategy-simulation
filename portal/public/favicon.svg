<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Tire -->
  <circle cx="32" cy="32" r="30" fill="#333" stroke="#222" stroke-width="2"/>
  <!-- Tread marks -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#444" stroke-width="3" stroke-dasharray="6 4"/>
  <!-- Rim -->
  <circle cx="32" cy="32" r="18" fill="#888" stroke="#666" stroke-width="2"/>
  <!-- Inner rim -->
  <circle cx="32" cy="32" r="14" fill="#aaa" stroke="#999" stroke-width="1"/>
  <!-- Spokes -->
  <line x1="32" y1="18" x2="32" y2="46" stroke="#777" stroke-width="3"/>
  <line x1="18" y1="32" x2="46" y2="32" stroke="#777" stroke-width="3"/>
  <line x1="22" y1="22" x2="42" y2="42" stroke="#777" stroke-width="3"/>
  <line x1="42" y1="22" x2="22" y2="42" stroke="#777" stroke-width="3"/>
  <!-- Hub -->
  <circle cx="32" cy="32" r="5" fill="#555" stroke="#444" stroke-width="1"/>
  <!-- Center bolt -->
  <circle cx="32" cy="32" r="2" fill="#333"/>
</svg>
