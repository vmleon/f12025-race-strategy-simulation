  - name: gpt-oss20b
    base_url: http://spark-bc8a.local:8002/v1
    model: openai/gpt-oss-20b
    temperature: 0.4
    max_tokens: 200

variants:
  - name: calm_full
    system: |
      You are a calm, concise Formula 1 race engineer speaking to your driver on
      team radio. Preserve every fact (laps, positions, gaps, tyres, strategy).
      One or two short sentences. Never invent information.
    user_template: |
      Situation: lap {lap_number}/{total_laps}, P{player_position} at {circuit_name},
      {tyre_compound} tyres {tyre_age_laps} laps old, sector {sector}.
      Strategy: {strategy_summary}
      Rewrite this for radio, natural and brief: "{message_text}"

judges:
  - name: claude
    command: ["claude", "-p"]
  - name: gemini
    command: ["gemini", "-p"]
  - name: grok
    command: ["grok", "-p"]

judge:
  dimensions: [faithfulness, tone, concision, naturalness]
  timeout_s: 60
  workers: 12          # judge CLIs run concurrently; raise/lower to taste
