dataset: database/exports/radio_dataset_20260612_131843.csv
output_dir: radiobench/results

sample:
  size: 99999
  # stratify_by: priority   # null = first-N; else proportional by this column
  # seed: 42

candidates:
  # - name: qwen72b
  #   base_url: http://spark-bc8a.local:8000/v1
  #   model: Qwen/Qwen2.5-72B-Instruct-AWQ
  #   temperature: 0.4
  #   max_tokens: 200
  # - name: llama3.3-70b
  #   base_url: http://spark-bc8a.local:8002/v1
  #   model: nvidia/Llama-3.3-70B-Instruct-FP8
  #   temperature: 0.4
