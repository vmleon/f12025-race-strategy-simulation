# Podman Compose for the F1 Race Strategy PoC stack.
# Oracle is NOT in this compose — run `python manage.py local setup` first.
# Telemetry uses host networking for UDP; the other services use the default bridge.

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  telemetry:
    build:
      context: ./telemetry
      dockerfile: Containerfile
    image: tfg-telemetry:dev
    ports:
      - "20777:20777/udp"
    environment:
      - ORACLE_HOST=host.containers.internal
      - ORACLE_PORT=1521
      - TCP_BACKEND_HOST=backend
      - TCP_BACKEND_PORT=9090
    healthcheck:
      test: ["CMD-SHELL", "test $(($(date +%s) - $(stat -c %Y /tmp/heartbeat))) -lt 60"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging

  backend:
    build:
      context: ./backend
      dockerfile: Containerfile
    image: tfg-backend:dev
    ports:
      - "8080:8080"   # REST + WS
      - "9090:9090"   # TCP ingestion from telemetry
    environment:
      - ORACLE_HOST=host.containers.internal
      - ORACLE_PORT=1521
      - SIMULATOR_URL=http://simulator:8081
      - ENGINEER_LLM_HOST=spark-bc8a.local
      - ENGINEER_LLM_PORT=8002
    extra_hosts:
      - "spark-bc8a.local:192.168.1.146"   # mDNS .local not resolvable inside container
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging

  simulator:
    build:
      context: ./simulator
      dockerfile: Containerfile
    image: tfg-simulator:dev
    ports:
      - "8081:8081"
    environment:
      - ORACLE_HOST=host.containers.internal
      - ORACLE_PORT=1521
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8081/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging

  calibration:
    build:
      context: ./calibration
      dockerfile: Containerfile
    image: tfg-calibration:dev
    restart: unless-stopped
    environment:
      - ORACLE_HOST=host.containers.internal
      - ORACLE_PORT=1521
    healthcheck:
      test: ["CMD-SHELL", "test $(($(date +%s) - $(stat -c %Y /tmp/heartbeat))) -lt 60"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging

  portal:
    build:
      context: ./portal
      dockerfile: Containerfile
    image: tfg-portal:dev
    ports:
      - "4200:4200"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:4200/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging
